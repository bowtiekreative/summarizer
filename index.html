<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summarizer — Desktop File Organizer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --panel: #161b22; --border: #30363d;
  --text: #e6edf3; --muted: #8b949e; --accent: #4fc3f7;
  --red: #e94560; --green: #69f0ae; --orange: #ffb74d;
  --red-bg: #2d1a1a; --green-bg: #1a2d1a;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
#header {
  position: sticky; top: 0; z-index: 100;
  background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; gap: 16px;
}
#header h1 { font-size: 18px; font-weight: 600; }
#header h1 span { color: var(--accent); }
#header .spacer { flex: 1; }
#stats { display: flex; gap: 20px; font-size: 13px; }
#stats .stat { display: flex; flex-direction: column; align-items: center; }
#stats .stat-value { font-weight: 600; font-size: 16px; }
#stats .stat-label { color: var(--muted); font-size: 11px; }
.btn {
  padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
  font-size: 13px; cursor: pointer; transition: all 0.15s; background: var(--panel); color: var(--text);
}
.btn:hover { border-color: var(--accent); }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red-bg); }
.btn-group { border-color: var(--orange); color: var(--orange); }
.btn-group:hover { background: #2d2a1a; }
.btn-refresh { border-color: var(--green); color: var(--green); }
.btn-refresh:hover { background: var(--green-bg); }
#main { padding: 0; max-width: 1200px; margin: 0 auto; }
#loading { text-align: center; padding: 60px; color: var(--muted); }
.spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.group {
  border-bottom: 1px solid var(--border); transition: background 0.1s;
}
.group:hover { background: rgba(79,195,247,0.03); }
.group-header {
  display: flex; align-items: center; padding: 10px 24px;
  cursor: pointer; gap: 12px; user-select: none;
}
.group-header:hover { background: rgba(255,255,255,0.03); }
.group-arrow { width: 16px; text-align: center; color: var(--muted); transition: transform 0.15s; }
.group-arrow.open { transform: rotate(90deg); }
.group-icon { font-size: 16px; }
.group-name { font-weight: 600; font-size: 14px; flex: 1; }
.group-count { color: var(--muted); font-size: 12px; min-width: 50px; text-align: right; }
.group-size { color: var(--accent); font-size: 12px; min-width: 80px; text-align: right; font-weight: 500; }
.group-actions { display: flex; gap: 6px; }
.files { display: none; }
.files.open { display: block; }
.file {
  display: flex; align-items: center; padding: 6px 24px 6px 72px;
  font-size: 13px; gap: 12px; transition: background 0.1s;
}
.file:hover { background: rgba(255,255,255,0.02); }
.file-ext {
  font-size: 10px; padding: 2px 6px; border-radius: 4px;
  background: var(--panel); border: 1px solid var(--border);
  color: var(--muted); min-width: 36px; text-align: center;
}
.file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-size { color: var(--muted); font-size: 12px; min-width: 70px; text-align: right; }
.file-date { color: var(--muted); font-size: 11px; min-width: 80px; text-align: right; }
.file-delete {
  opacity: 0; transition: opacity 0.15s; background: none; border: none;
  color: var(--red); cursor: pointer; font-size: 13px; padding: 2px 6px;
}
.file:hover .file-delete { opacity: 1; }
.file-delete:hover { background: var(--red-bg); border-radius: 4px; }
.file-deleting { opacity: 0.4; pointer-events: none; text-decoration: line-through; }
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  padding: 12px 20px; border-radius: 8px; font-size: 13px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5); max-width: 400px;
  transition: all 0.3s; transform: translateY(20px); opacity: 0;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { background: var(--green-bg); border: 1px solid var(--green); color: var(--green); }
.toast.error { background: var(--red-bg); border: 1px solid var(--red); color: var(--red); }
.modal-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px; max-width: 480px; width: 90%;
}
.modal h3 { margin-bottom: 12px; }
.modal p { color: var(--muted); font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
#empty-state { text-align: center; padding: 80px 24px; color: var(--muted); }
#empty-state h2 { font-size: 24px; margin-bottom: 8px; }
#error-state { text-align: center; padding: 80px 24px; color: var(--red); }
.scan-status { font-size: 12px; color: var(--muted); padding: 8px 0 0 24px; }
</style>
</head>
<body>

<div id="header">
  <h1>📁 <span>Summarizer</span></h1>
  <div class="spacer"></div>
  <div id="stats"></div>
  <button class="btn btn-refresh" onclick="scan()">⟳ Scan</button>
</div>

<div id="main">
  <div id="loading"><div class="spinner"></div><p style="margin-top:12px">Scanning desktop...</p></div>
  <div id="groups-container"></div>
  <div id="empty-state" style="display:none">
    <h2>✨ Clean Desktop</h2>
    <p>No files found on the desktop.</p>
  </div>
  <div id="error-state" style="display:none"></div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <h3 id="modal-title">Confirm Delete</h3>
    <p id="modal-message">Are you sure?</p>
    <div class="actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="modal-confirm">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let data = null;
let pendingAction = null;

function closeModal() {
  document.getElementById('confirm-modal').classList.remove('show');
  pendingAction = null;
}

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => el.classList.remove('show'), 3000);
}

function confirm(title, message, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-message').textContent = message;
  document.getElementById('confirm-modal').classList.add('show');
  pendingAction = cb;
}

document.getElementById('modal-confirm').onclick = function() {
  closeModal();
  if (pendingAction) pendingAction();
};

function formatSize(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
  return (bytes / 1073741824).toFixed(2) + ' GB';
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function scan() {
  const loading = document.getElementById('loading');
  const container = document.getElementById('groups-container');
  const empty = document.getElementById('empty-state');
  const error = document.getElementById('error-state');
  const stats = document.getElementById('stats');

  loading.style.display = 'block';
  container.innerHTML = '';
  empty.style.display = 'none';
  error.style.display = 'none';
  stats.innerHTML = '';

  try {
    const resp = await fetch('/api/groups');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    data = await resp.json();
    loading.style.display = 'none';

    if (!data.groups || data.groups.length === 0) {
      empty.style.display = 'block';
      stats.innerHTML = '<div class="stat"><span class="stat-value">0</span><span class="stat-label">files</span></div>';
      return;
    }

    render(data);
  } catch (e) {
    loading.style.display = 'none';
    error.style.display = 'block';
    error.innerHTML = `<h2>❌ Failed to Scan</h2><p>${escapeHtml(e.message)}<br><br><button class="btn btn-refresh" onclick="scan()">Retry</button></p>`;
  }
}

function render(d) {
  const container = document.getElementById('groups-container');
  const stats = document.getElementById('stats');
  container.innerHTML = '';
  let html = '';

  // Stats
  stats.innerHTML = `
    <div class="stat"><span class="stat-value">${d.stats.totalFiles}</span><span class="stat-label">files</span></div>
    <div class="stat"><span class="stat-value">${d.stats.groupCount}</span><span class="stat-label">groups</span></div>
    <div class="stat"><span class="stat-value">${formatSize(d.stats.totalSize)}</span><span class="stat-label">total</span></div>
  `;

  // Groups
  for (const group of d.groups) {
    html += `<div class="group" data-group="${escapeHtml(group.name)}">`;
    html += `<div class="group-header" onclick="toggleGroup(this)">`;
    html += `<span class="group-arrow open">▶</span>`;
    html += `<span class="group-icon">${getIcon(group.name)}</span>`;
    html += `<span class="group-name">${escapeHtml(group.name)}</span>`;
    html += `<span class="group-count">${group.count} files</span>`;
    html += `<span class="group-size">${group.totalSizeFormatted || formatSize(group.totalSize)}</span>`;
    html += `<span class="group-actions">`;
    html += `<button class="btn btn-group" onclick="event.stopPropagation();deleteGroup('${escapeHtml(group.name)}')">🗑 Group</button>`;
    html += `</span>`;
    html += `</div>`;
    html += `<div class="files open">`;

    for (const file of group.files) {
      const safePath = escapeHtml(file.path);
      html += `<div class="file" data-path="${safePath}">`;
      html += `<span class="file-ext">${escapeHtml(file.ext || '(?)')}</span>`;
      html += `<span class="file-name" title="${safePath}">${escapeHtml(file.name)}</span>`;
      html += `<span class="file-size">${file.sizeFormatted || formatSize(file.size)}</span>`;
      html += `<span class="file-date">${file.mtime || ''}</span>`;
      html += `<button class="file-delete" onclick="deleteFile('${safePath}', this)" title="Delete file">✕</button>`;
      html += `</div>`;
    }

    html += `</div></div>`;
  }

  container.innerHTML = html;
}

function getIcon(groupName) {
  const n = groupName.toLowerCase();
  if (n.includes('image') || n.includes('screenshot') || n.includes('photo') || n.includes('img')) return '🖼';
  if (n.includes('video') || n.includes('movie') || n.includes('clip') || n.includes('recording')) return '🎬';
  if (n.includes('audio') || n.includes('music') || n.includes('song') || n.includes('podcast')) return '🎵';
  if (n.includes('pdf') || n.includes('doc') || n.includes('text')) return '📄';
  if (n.includes('spreadsheet') || n.includes('csv') || n.includes('excel')) return '📊';
  if (n.includes('archive') || n.includes('zip') || n.includes('rar')) return '📦';
  if (n.includes('exec') || n.includes('.exe')) return '⚙';
  if (n.includes('code') || n.includes('script') || n.includes('source')) return '💻';
  if (n.includes('shortcut') || n.includes('link')) return '🔗';
  if (n.includes('temp') || n.includes('tmp')) return '🗑';
  if (n.includes('backup') || n.includes('export') || n.includes('archive')) return '💾';
  if (n.includes('download') || n.includes('install') || n.includes('setup')) return '📥';
  if (n.includes('invoice') || n.includes('receipt') || n.includes('bill') || n.includes('payment')) return '🧾';
  if (n.includes('contract') || n.includes('agreement') || n.includes('proposal')) return '📋';
  if (n.includes('note') || n.includes('todo') || n.includes('list')) return '📝';
  if (n.includes('tiny') || n.includes('small')) return '🔸';
  if (n.includes('medium')) return '🔹';
  if (n.includes('large') || n.includes('big') || n.includes('huge')) return '🔶';
  return '📎';
}

function toggleGroup(header) {
  const arrow = header.querySelector('.group-arrow');
  const files = header.nextElementSibling;
  const open = files.classList.toggle('open');
  arrow.classList.toggle('open');
}

async function deleteFile(safePath, btn) {
  // Unescape the path
  const div = document.createElement('div');
  div.innerHTML = safePath;
  const filePath = div.textContent;

  confirm('Delete File?', `Delete "${filePath.split('\\').pop()}"?`, async () => {
    const row = btn.closest('.file');
    row.classList.add('file-deleting');
    try {
      const resp = await fetch('/api/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: filePath })
      });
      const result = await resp.json();
      if (result.ok) {
        toast('✅ Deleted: ' + filePath.split('\\').pop());
        row.remove();
        // Recalculate group stats
        updateGroupStats();
      } else {
        toast('❌ ' + (result.error || 'Delete failed'), 'error');
        row.classList.remove('file-deleting');
      }
    } catch (e) {
      toast('❌ ' + e.message, 'error');
      row.classList.remove('file-deleting');
    }
  });
}

async function deleteGroup(groupName) {
  const group = document.querySelector(`.group[data-group="${CSS.escape(groupName)}"]`);
  if (!group) return;

  const fileRows = group.querySelectorAll('.file');
  const paths = Array.from(fileRows).map(r => r.getAttribute('data-path'));

  // Decode
  const div = document.createElement('div');
  const decodedPaths = paths.map(p => { div.innerHTML = p; return div.textContent; });

  confirm('Delete Group?', `Delete entire "${groupName}" group (${paths.length} files)?`, async () => {
    try {
      const resp = await fetch('/api/delete-group', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paths: decodedPaths })
      });
      const result = await resp.json();
      if (result.ok) {
        toast(`✅ Deleted ${result.deleted} files from "${groupName}"`);
        group.remove();
        updateStatsAfterDeletion();
      } else {
        toast('❌ ' + (result.error || 'Delete failed'), 'error');
      }
    } catch (e) {
      toast('❌ ' + e.message, 'error');
    }
  });
}

function updateGroupStats() {
  // Recalculate per-group counts and totals after deletions
  document.querySelectorAll('.group').forEach(g => {
    const files = g.querySelectorAll('.file');
    const count = files.length;
    g.querySelector('.group-count').textContent = count + ' files';
    if (count === 0) {
      g.remove();
    }
  });
  updateStatsAfterDeletion();
}

function updateStatsAfterDeletion() {
  const totalFiles = document.querySelectorAll('.file').length;
  const totalGroups = document.querySelectorAll('.group').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><span class="stat-value">${totalFiles}</span><span class="stat-label">files</span></div>
    <div class="stat"><span class="stat-value">${totalGroups}</span><span class="stat-label">groups</span></div>
  `;
  if (totalFiles === 0) {
    document.getElementById('empty-state').style.display = 'block';
  }
}

// Initial scan on load
document.addEventListener('DOMContentLoaded', scan);
</script>
</body>
</html>
